name: E2E

# T2 render smoke + T3 pinned-HA end-to-end scenarios. Runs on PRs to main and
# on demand. See specs/ec_weather/test-strategy.md.
#
# ============================ SHADOW MODE ============================
# Every e2e-* job below carries `continue-on-error: true`. The harness cannot
# be run locally (no docker on the dev machine), so it ships in SHADOW MODE:
# failures are visible but do NOT block. After the FIRST green run on a real
# release, FLIP e2e-a / e2e-b / e2e-c to blocking by removing their
# `continue-on-error: true` lines (leave e2e-stable informational forever).
# ====================================================================

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions: {}

jobs:
  render-smoke:
    name: T2 render smoke
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v6"
      - uses: "actions/setup-node@v4"
        with:
          node-version: "22"
      - name: Install pnpm
        run: npm install -g pnpm@9.12.0
      - name: Install card dev deps (@mdi/js for the ha-icon shim)
        working-directory: custom_components/ec_weather/www
        run: pnpm install --frozen-lockfile
      - name: Run render-smoke assertions (all views × themes × viewports)
        working-directory: custom_components/ec_weather/www/screenshot-tool
        env:
          SCREENSHOT_BROWSER: "google-chrome"
        run: ./assert.sh
      - name: Upload failing DOM dumps
        if: failure()
        uses: "actions/upload-artifact@v4"
        with:
          name: render-smoke-dumps
          path: custom_components/ec_weather/www/screenshot-tool/dump/
          if-no-files-found: ignore

  e2e-a:
    name: T3 S1-S3 (pinned HA)
    runs-on: "ubuntu-latest"
    continue-on-error: true  # SHADOW MODE — remove after first green release
    steps:
      - uses: "actions/checkout@v6"
      - uses: "actions/setup-node@v4"
        with:
          node-version: "22"
      - name: Run S1 -> S2 -> S3 (chained, one container)
        run: node .github/e2e/run.mjs s1 s2 s3

  e2e-b:
    name: T3 S4 restart (pinned HA)
    runs-on: "ubuntu-latest"
    continue-on-error: true  # SHADOW MODE — remove after first green release
    steps:
      - uses: "actions/checkout@v6"
      - uses: "actions/setup-node@v4"
        with:
          node-version: "22"
      - name: Run S4 (restart persistence)
        run: node .github/e2e/run.mjs s4

  e2e-c:
    name: T3 S5 upgrade (pinned HA)
    runs-on: "ubuntu-latest"
    continue-on-error: true  # SHADOW MODE — remove after first green release
    env:
      EC_WEATHER_REPO: "${{ github.repository }}"
    steps:
      - uses: "actions/checkout@v6"
      - uses: "actions/setup-node@v4"
        with:
          node-version: "22"
      - name: Run S5 (previous release -> candidate upgrade)
        run: node .github/e2e/run.mjs s5

  e2e-stable:
    name: T3 S1-S3 (:stable, informational)
    runs-on: "ubuntu-latest"
    continue-on-error: true  # informational forever — never blocks
    steps:
      - uses: "actions/checkout@v6"
      - uses: "actions/setup-node@v4"
        with:
          node-version: "22"
      - name: Run S1 -> S2 -> S3 on the :stable image
        run: node .github/e2e/run.mjs s1 s2 s3 --ha-version stable
