name: HA drift

# Daily cheap check (one GitHub API call) for a NEW Home Assistant MINOR
# version. HA ships breaking changes in minors (YYYY.M); patches are bug fixes.
# When the minor changed since the last validated run, launch the full S1-S3
# fresh-install e2e against the :stable image. On success, record the new
# version; on failure, open (or comment on) a `ha-drift` issue.
#
# Role: EARLY WARNING between our releases, nothing more. The integration
# targets latest stable HA only (no version pinning, no support floor — owner
# decision, July 12, 2026), so there is no pin to bump here: if a new HA minor
# breaks S1-S3, this opens an issue and nothing else changes. The e2e.yml PR
# jobs run :stable too and will surface the same drift on the next release PR.
#
# Baseline vs drift: the FIRST run (no recorded version) is a BASELINE — no HA
# version change was observed, so a failure there may not be HA-related (EC
# transient, runner issue, harness bug; see run 29145482481) and gets a
# distinct issue title. Only a true drift (recorded X -> new Y) may blame the
# HA version. A later green run auto-closes any open ha-drift issues.
#
# State lives in ha-e2e-version.txt on the repo's `ci-state` branch (created
# on first success) — that file records the last VALIDATED HA version for the
# minor-change comparison; it is drift-detection state, not a supported-version
# declaration. See specs/ec_weather/test-strategy.md.

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  drift:
    name: Detect HA minor drift
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
      issues: write
    steps:
      - uses: "actions/checkout@v6"
      - uses: "actions/setup-node@v4"
        with:
          node-version: "22"

      - name: Compare latest HA release against recorded version
        id: versions
        env:
          GH_TOKEN: "${{ github.token }}"
        run: |
          NEW=$(gh api repos/home-assistant/core/releases/latest --jq '.tag_name')
          OLD=$(gh api "repos/${{ github.repository }}/contents/ha-e2e-version.txt?ref=ci-state" \
            --jq '.content' 2>/dev/null | base64 -d 2>/dev/null | tr -d '[:space:]' || true)
          RESULT=$(node .github/e2e/lib/version.mjs "$OLD" "$NEW")
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "old=$OLD" >> "$GITHUB_OUTPUT"
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
          echo "HA latest=$NEW  recorded=${OLD:-<none>}  ->  $RESULT"

      - name: Run S1-S3 on :stable
        id: e2e
        if: steps.versions.outputs.result == 'changed'
        continue-on-error: true
        run: node .github/e2e/run.mjs s1 s2 s3 --ha-version stable

      - name: Record validated HA version
        if: steps.versions.outputs.result == 'changed' && steps.e2e.outcome == 'success'
        env:
          NEW: "${{ steps.versions.outputs.new }}"
        run: |
          git config user.name "ec-weather-ci"
          git config user.email "ec-weather-ci@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin ci-state >/dev/null 2>&1; then
            git fetch origin ci-state
            git checkout ci-state
          else
            git checkout --orphan ci-state
            git rm -rf . >/dev/null 2>&1 || true
          fi
          echo "$NEW" > ha-e2e-version.txt
          git add ha-e2e-version.txt
          git commit -m "ci: HA e2e validated on $NEW" || { echo "no change"; exit 0; }
          git push origin ci-state

      - name: Close resolved drift issues
        if: steps.versions.outputs.result == 'changed' && steps.e2e.outcome == 'success'
        env:
          GH_TOKEN: "${{ github.token }}"
        run: |
          for NUM in $(gh issue list --label ha-drift --state open --json number --jq '.[].number'); do
            gh issue close "$NUM" --comment "A later run passed; closing."
          done

      - name: Open or update drift issue
        if: steps.versions.outputs.result == 'changed' && steps.e2e.outcome == 'failure'
        env:
          GH_TOKEN: "${{ github.token }}"
          NEW: "${{ steps.versions.outputs.new }}"
          OLD: "${{ steps.versions.outputs.old }}"
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          # Baseline vs drift: with no recorded version this run only ESTABLISHES
          # a baseline — no HA change was observed, so the failure may not be
          # HA-related. Only a true drift (recorded X -> new Y) blames HA.
          if [ -z "$OLD" ]; then
            TITLE="e2e baseline run failed (HA $NEW)"
            BODY="The first e2e baseline run failed on HA \`$NEW\`. No HA version change was observed"
            BODY="$BODY (no previously recorded version), so this failure may not be HA-related —"
            BODY="$BODY possible causes include an EC transient, a runner/network issue, or a harness bug. Run: $RUN_URL"
          else
            TITLE="HA $NEW breaks fresh install e2e"
            BODY="HA \`$NEW\` breaks the fresh-install e2e (S1-S3 on the :stable image). Previously validated: \`$OLD\`. Run: $RUN_URL"
          fi
          OPEN=$(gh issue list --label ha-drift --state open --json number --jq 'length')
          if [ "$OPEN" -gt 0 ]; then
            NUM=$(gh issue list --label ha-drift --state open --json number --jq '.[0].number')
            gh issue comment "$NUM" --body "$BODY"
          else
            gh label create ha-drift --color B60205 --description "HA version drift broke the e2e" 2>/dev/null || true
            gh issue create --label ha-drift --title "$TITLE" --body "$BODY"
          fi
